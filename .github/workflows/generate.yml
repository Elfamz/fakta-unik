name: Generate Ciper Gaming

on:
  schedule:
    # Waktu dalam UTC (WIB = UTC+7)
    # 06:30 WIB = 23:30 UTC (hari sebelumnya)
    - cron: '30 23 * * *'
    # 11:30 WIB = 04:30 UTC
    - cron: '30 4 * * *'
    # 18:30 WIB = 11:30 UTC
    - cron: '30 11 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'
          cache-dependency-path: requirements.txt

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg fonts-liberation

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Run content factory
        timeout-minutes: 10
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          YT_COOKIES_DATA: ${{ secrets.YT_COOKIES }}
        run: |
          if [ -n "$YT_COOKIES_DATA" ]; then
            echo "$YT_COOKIES_DATA" > youtube_cookies.txt
            echo "Cookies berhasil dimuat ke dalam workspace server."
          fi
          python content_factory.py
